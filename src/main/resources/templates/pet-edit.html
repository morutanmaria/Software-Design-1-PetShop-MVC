<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Pet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">
  <div class="card shadow p-4">

    <h3>Edit Pet</h3>

    <form action="/pets/update" method="post">

      <input type="hidden" name="id" th:value="${pet.id}">

      <input class="form-control mb-2" name="name" th:value="${pet.name}">
      <input class="form-control mb-2" name="species" th:value="${pet.species}">
      <input class="form-control mb-2" name="breed" th:value="${pet.breed}">
      <input class="form-control mb-2" name="age" th:value="${pet.age}">
      <input class="form-control mb-2" name="price" th:value="${pet.price}">

      <button class="btn btn-warning w-100">Update</button>
    </form>

  </div>
</div>

</body>
</html>
