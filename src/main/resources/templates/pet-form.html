<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Pet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow p-4">

        <h3>Add Pet</h3>

        <form action="/pets/save" method="post">

            <input class="form-control mb-2" name="name" placeholder="Name">
            <input class="form-control mb-2" name="species" placeholder="Species">
            <input class="form-control mb-2" name="breed" placeholder="Breed">
            <input class="form-control mb-2" name="age" type="number" placeholder="Age">
            <input class="form-control mb-2" name="price" type="number" placeholder="Price">

            <button class="btn btn-success w-100">Save</button>
        </form>

    </div>
</div>

</body>
</html>
