<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Item</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">
  <div class="card shadow p-4">

    <h3>Add Item</h3>

    <form action="/items/add" method="post">

      <input class="form-control mb-2" name="name" placeholder="Name" required>
      <input class="form-control mb-2" name="description" placeholder="Description">
      <input class="form-control mb-2" name="price" type="number" step="0.01" placeholder="Price" required>

      <select name="type" class="form-select mb-2" required>
        <option value="FOOD">Food</option>
        <option value="TOY">Toy</option>
        <option value="ACCESSORY">Accessory</option>
      </select>

      <select name="petId" class="form-select mb-2">
        <option th:each="pet : ${pets}" th:value="${pet.id}" th:text="${pet.name}"></option>
      </select>

      <input class="form-control mb-2" name="imagePath" placeholder="Image path e.g. /images/items/item1.jpg">

      <button class="btn btn-success w-100">Save</button>
    </form>

  </div>
</div>

</body>
</html>
