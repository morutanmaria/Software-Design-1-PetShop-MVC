<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Pets List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">
  <h1>Pets List</h1>

  <div th:if="${loggedUser != null and (loggedUser.role.name() == 'ADMIN' or loggedUser.role.name() == 'SELLER')}" class="mb-3">
    <a th:href="@{/pets/add}" class="btn btn-success">Add New Pet</a>
  </div>

  <form th:action="@{/pets}" method="get" class="mb-3 d-flex">
    <input type="text" name="search" th:value="${search}" placeholder="Search by name..." class="form-control me-2" />
    <button type="submit" class="btn btn-primary">Search</button>
  </form>

  <div class="mb-3">

    <form method="get" action="/export/pets" class="d-inline">
      <input type="hidden" name="format" value="json">
      <input type="hidden" name="name" th:value="${search}">
      <input type="hidden" name="sortField" th:value="${sortField}">
      <input type="hidden" name="sortDir" th:value="${sortDir}">
      <button type="submit" class="btn btn-primary">Export JSON</button>
    </form>

    <form method="get" action="/export/pets" class="d-inline">
      <input type="hidden" name="format" value="csv">
      <input type="hidden" name="name" th:value="${search}">
      <input type="hidden" name="sortField" th:value="${sortField}">
      <input type="hidden" name="sortDir" th:value="${sortDir}">
      <button type="submit" class="btn btn-secondary">Export CSV</button>
    </form>

    <form method="get" action="/export/pets" class="d-inline">
      <input type="hidden" name="format" value="xml">
      <input type="hidden" name="name" th:value="${search}">
      <input type="hidden" name="sortField" th:value="${sortField}">
      <input type="hidden" name="sortDir" th:value="${sortDir}">
      <button type="submit" class="btn btn-success">Export XML</button>
    </form>

  </div>

  <table class="table table-striped table-hover align-middle"
         style="table-layout: fixed;">

    <thead>
    <tr>
      <th style="width:80px;">Image</th>
      <th>
        Name
        <a th:href="@{/pets(sortField='name', sortDir='asc', search=${search})}" class="btn btn-sm btn-outline-success ms-1">↑</a>
        <a th:href="@{/pets(sortField='name', sortDir='desc', search=${search})}" class="btn btn-sm btn-outline-danger ms-1">↓</a>
      </th>
      <th>Species</th>
      <th>Breed</th>
      <th>
        Age
        <a th:href="@{/pets(sortField='age', sortDir='asc', search=${search})}" class="btn btn-sm btn-outline-success ms-1">↑</a>
        <a th:href="@{/pets(sortField='age', sortDir='desc', search=${search})}" class="btn btn-sm btn-outline-danger ms-1">↓</a>
      </th>
      <th>
        Price
        <a th:href="@{/pets(sortField='price', sortDir='asc', search=${search})}" class="btn btn-sm btn-outline-success ms-1">↑</a>
        <a th:href="@{/pets(sortField='price', sortDir='desc', search=${search})}" class="btn btn-sm btn-outline-danger ms-1">↓</a>
      </th>
      <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="pet : ${pets}">

      <!-- IMAGE -->
      <td class="text-center">
        <img th:src="${pet.imagePath != null} ? ${pet.imagePath} : '/images/default.png'"
             style="width:60px; height:60px; object-fit:cover; border-radius:8px;"
             alt="pet">
      </td>

      <td th:text="${pet.name}"></td>
      <td th:text="${pet.species}"></td>
      <td th:text="${pet.breed}"></td>
      <td th:text="${pet.age}"></td>
      <td th:text="${pet.price}"></td>

      <td>
        <a th:if="${loggedUser != null and loggedUser.role.name() == 'ADMIN'}"
           th:href="@{'/pets/edit/' + ${pet.id}}"
           class="btn btn-sm btn-warning">Edit</a>

        <a th:if="${loggedUser != null and loggedUser.role.name() == 'ADMIN'}"
           th:href="@{'/pets/delete/' + ${pet.id}}"
           class="btn btn-sm btn-danger"
           onclick="return confirm('Are you sure you want to delete this pet?');">
          Delete
        </a>
      </td>

    </tr>
    </tbody>

  </table>
</div>

</body>
</html>
