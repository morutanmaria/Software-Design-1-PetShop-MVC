<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="container text-center mt-5">
    <h1 class="mb-4">🐾 Welcome to PetShop</h1>

    <div class="d-flex justify-content-center gap-3">
        <a href="/pets" class="btn btn-primary btn-lg">
            <i class="fa-solid fa-dog"></i> View Pets
        </a>
        <a href="/items" class="btn btn-info btn-lg text-white">
            <i class="fa-solid fa-basket-shopping"></i> View Items
        </a>

        <a th:if="${loggedUser == null}" href="/login" class="btn btn-success btn-lg">
            <i class="fa-solid fa-right-to-bracket"></i> Login
        </a>
        <a th:if="${loggedUser != null}" href="/logout" class="btn btn-danger btn-lg">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>

    <p th:if="${loggedUser != null}" class="mt-3 text-muted">
        Logged in as: <span class="fw-bold" th:text="${loggedUser.username}"></span>
        (<span th:text="${loggedUser.role}"></span>)
    </p>
</div>
</body>
</html>
